# pre-commit 配置 — Aegis Toolchain 自身也受 Aegis 管理
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Lint
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: Ruff Format
        entry: ruff format --check
        language: system
        types: [python]
        pass_filenames: true

      - id: aegis-check
        name: Aegis Compliance Check
        entry: python -m aegis_toolchain.hooks.pre_commit
        language: system
        pass_filenames: false
        always_run: true
